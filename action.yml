name: "Repocaster"
description: "Generate an AI audio briefing from repository context. Intended for owner controlled workflows."
inputs:
  repository:
    description: "Optional owner/name repository to checkout and analyze. Defaults to the caller workspace."
    required: false
    default: ""
  ref:
    description: "Optional branch, tag, or SHA to checkout for repository. Defaults to the repository default ref."
    required: false
    default: ""
  mode:
    description: "Briefing mode: architecture or focus."
    required: false
    default: "architecture"
  focus:
    description: "Optional focus topic for deep dives."
    required: false
    default: ""
  output:
    description: "Output MP3 path."
    required: false
    default: "output/repocaster.mp3"
runs:
  using: "composite"
  steps:
    - name: Checkout target repository
      if: inputs.repository != ''
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        path: repocaster-target
    - shell: bash
      env:
        REPOCASTER_REPOSITORY: ${{ inputs.repository }}
        REPOCASTER_MODE: ${{ inputs.mode }}
        REPOCASTER_FOCUS: ${{ inputs.focus }}
        REPOCASTER_OUTPUT: ${{ inputs.output }}
      run: |
        python -m pip install "$GITHUB_ACTION_PATH"
        repo_path="$GITHUB_WORKSPACE"
        if [ -n "$REPOCASTER_REPOSITORY" ]; then
          repo_path="$GITHUB_WORKSPACE/repocaster-target"
        fi
        repocaster --repo "$repo_path" --mode "$REPOCASTER_MODE" --focus "$REPOCASTER_FOCUS" --output "$REPOCASTER_OUTPUT"
