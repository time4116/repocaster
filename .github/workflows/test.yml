name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: python -m pip install --upgrade 'setuptools>=83.0.0'
      - run: pytest -q
      - run: python -m compileall -q src tests scripts
      - run: bandit -q -r src scripts -x tests
      - run: pip-audit
